# Template for Streamlit secrets.
# Local: copy to secrets.toml and fill in real values (secrets.toml is gitignored).
# Streamlit Cloud: paste these keys into the app's Secrets dashboard instead.

[users]
birgitte = "choose_a_password"
monica   = "choose_a_password"

[aws]
bearer_token = "your_aws_bedrock_bearer_token"
